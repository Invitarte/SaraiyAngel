<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación A&S</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --azul:#0b1c2d;
  --rosa:#e6b7c8;
  --rosagold:#e8b4b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--azul);
  font-family:'Poppins',sans-serif;
  color:var(--rosagold);
  overflow-x:hidden;
}

/* ---------------- SOBRE ---------------- */

#portada{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(145deg,#0b1c2d,#122c44);
  transition:1s;
}

.sobre{
  width:90%;
  max-width:420px;
  height:280px;
  background:#10283f;
  position:relative;
  border-radius:10px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  overflow:hidden;
}

/* Solapa */
.solapa{
  position:absolute;
  width:100%;
  height:100%;
  background:#0e2235;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
}

/* Contenido */
.contenido-sobre{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* SELLO DE CERA */
.sello{
  width:130px;
  height:130px;
  background:radial-gradient(circle at 30% 30%, #f6d4da, #d88fa5);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Great Vibes',cursive;
  font-size:48px;
  color:white;
  cursor:pointer;
  box-shadow:
    inset -8px -8px 15px rgba(0,0,0,0.3),
    inset 8px 8px 15px rgba(255,255,255,0.3),
    0 10px 20px rgba(0,0,0,0.5);
  transition:0.4s;
}

.sello:hover{
  transform:scale(1.08);
}

/* Animación romper sello */
.sello.romper{
  animation:romper 0.6s forwards;
}

@keyframes romper{
  0%{transform:scale(1);}
  50%{transform:scale(0.9);}
  100%{transform:scale(0); opacity:0;}
}

.abrir .solapa{
  transform:rotateX(180deg);
}

/* ---------------- INTERIOR ---------------- */

#invitacion{
  display:none;
  padding:40px 20px;
  text-align:center;
}

.seccion{
  margin:60px 0;
  position:relative;
}

.seccion::before{
  content:"✦";
  display:block;
  font-size:22px;
  margin-bottom:10px;
  opacity:0.6;
}

/* Animación Scroll */
.animar{
  opacity:0;
  transform:translateY(60px);
  transition:all 1s ease;
}

.animar.visible{
  opacity:1;
  transform:translateY(0);
}

.iniciales{
  font-family:'Great Vibes',cursive;
  font-size:70px;
  margin-bottom:30px;
}

/* Calendario */
.calendario{
  max-width:350px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.grid div{
  padding:10px 0;
  border:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}

.heart{
  position:relative;
  font-weight:bold;
}

.heart::before{
  content:"❤";
  position:absolute;
  font-size:32px;
  color:var(--rosagold);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:-1;
}

/* Títulos */
h3{
  font-family:'Great Vibes',cursive;
  font-size:42px;
  margin-bottom:10px;
}

/* Cuenta regresiva */
#countdown{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

#countdown div{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  min-width:70px;
  font-size:18px;
}

/* Eventos */
.eventos{
  display:flex;
  gap:15px;
}

.evento{
  flex:1;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
}

/* Slider */
.slider{
  position:relative;
  max-width:320px;
  margin:auto;
}

.slider img{
  width:100%;
  border-radius:20px;
  display:none;
}

.slider img.active{
  display:block;
}

.flecha{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

.prev{left:0;}
.next{right:0;}

button{
  background:transparent;
  border:1px solid var(--rosagold);
  color:var(--rosagold);
  padding:12px 28px;
  margin-top:15px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:0.4s;
}

button:hover{
  background:var(--rosagold);
  color:var(--azul);
}

</style>
</head>
<body>

<section id="portada">
  <div class="sobre" id="sobre">
    <div class="solapa"></div>
    <div class="contenido-sobre">
      <div class="sello" id="sello">A & S</div>
    </div>
  </div>
</section>

<section id="invitacion">

<div class="iniciales seccion animar">A & S</div>

<div class="calendario seccion animar">
<h3>Mayo 2026</h3>
<div class="grid">
<div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
<div></div><div></div><div></div><div></div><div>1</div><div>2</div><div>3</div>
<div>4</div><div>5</div><div>6</div><div>7</div><div>8</div><div>9</div><div>10</div>
<div>11</div><div>12</div><div>13</div><div>14</div><div>15</div><div class="heart">16</div><div>17</div>
<div>18</div><div>19</div><div>20</div><div>21</div><div>22</div><div>23</div><div>24</div>
<div>25</div><div>26</div><div>27</div><div>28</div><div>29</div><div>30</div><div>31</div>
</div>
</div>

<div class="seccion animar">
<h3>Nuestra Boda Ángel & Saraí</h3>
<div id="countdown"></div>
<p>El amor es la razón de este día, y tu presencia lo hará aún más especial.<br>
Con la bendición de Dios queremos compartir este día contigo.</p>
</div>

</section>

<script>

/* SELLO */
document.getElementById("sello").addEventListener("click",function(){
  this.classList.add("romper");
  setTimeout(()=>{
    document.getElementById("sobre").classList.add("abrir");
  },500);
  setTimeout(()=>{
    document.getElementById("portada").style.display="none";
    document.getElementById("invitacion").style.display="block";
  },1300);
});

/* COUNTDOWN */
const fechaBoda = new Date("May 16, 2026 19:30:00").getTime();

setInterval(()=>{
  const ahora = new Date().getTime();
  const diferencia = fechaBoda - ahora;

  const dias = Math.floor(diferencia/(1000*60*60*24));
  const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
  const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));
  const segundos = Math.floor((diferencia%(1000*60))/1000);

  document.getElementById("countdown").innerHTML = `
  <div>${dias}d</div>
  <div>${horas}h</div>
  <div>${minutos}m</div>
  <div>${segundos}s</div>`;
},1000);

/* Scroll animación */
const elementos = document.querySelectorAll(".animar");

function mostrarAlScroll(){
  const alturaPantalla = window.innerHeight;
  elementos.forEach(el=>{
    const distancia = el.getBoundingClientRect().top;
    if(distancia < alturaPantalla - 100){
      el.classList.add("visible");
    }
  });
}

window.addEventListener("scroll", mostrarAlScroll);
window.addEventListener("load", mostrarAlScroll);

</script>

</body>
</html>
