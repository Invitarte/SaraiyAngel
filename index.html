<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación</title>

<style>
body{
font-family: 'Segoe UI', sans-serif;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

/* SOBRE */

.envelope{
position:relative;
width:300px;
height:200px;
border:3px solid #ff6fa5; /* contorno rosa */
background:#fff;
cursor:pointer;
}

.flap{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-top:120px solid #ff6fa5;
transform-origin:top;
transition:0.8s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.card{
position:absolute;
width:90%;
height:90%;
background:white;
top:10px;
left:5%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:0.8s;
}

.envelope.open .card{
opacity:1;
transform:translateY(-80px);
}

/* CALENDARIO */

.calendar{
width:50%;
border:1px solid #ddd;
font-size:10px;
text-align:center;
margin-top:10px;
}

.calendar table{
width:100%;
border-collapse:collapse;
}

.calendar th{
background:#ff6fa5;
color:white;
padding:3px;
}

.calendar td{
padding:3px;
border:1px solid #eee;
}

/* CUENTA REGRESIVA */

#countdown{
margin-top:30px;
font-size:22px;
color:#ff6fa5;
font-weight:bold;
}

</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()">

<div class="flap"></div>

<div class="card">

<h3>Estás Invitado</h3>
<p>15 de Junio 2025</p>

<div class="calendar">
<table>
<tr>
<th>L</th><th>M</th><th>M</th><th>J</th><th>V</th><th>S</th><th>D</th>
</tr>

<tr>
<td></td><td></td><td></td><td></td><td></td><td>1</td><td>2</td>
</tr>

<tr>
<td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td>
</tr>

<tr>
<td>10</td><td>11</td><td>12</td><td>13</td><td>14</td>
<td style="background:#ff6fa5;color:white;">15</td>
<td>16</td>
</tr>

<tr>
<td>17</td><td>18</td><td>19</td><td>20</td><td>21</td><td>22</td><td>23</td>
</tr>

<tr>
<td>24</td><td>25</td><td>26</td><td>27</td><td>28</td><td>29</td><td>30</td>
</tr>

</table>
</div>

</div>
</div>

<div id="countdown"></div>

<script>

function openEnvelope(){
document.querySelector(".envelope").classList.toggle("open");
}

/* CUENTA REGRESIVA */

const eventDate = new Date("June 15, 2025 00:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = eventDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);

</script>

</body>
</html>
